Trade works as attraction and growth driver, with a positive trade balance contributing to economic growth and a negative balance indicating a trade deficit. Investments, subsidies, and projects can drive growth and development in various sectors of the economy, while local market output reflects the overall economic activity generated within the domestic market. In a planned economy, export surplus and domestic production are key indicators of economic performance, while efficiency metrics can provide insights into the effectiveness of resource utilization and production processes. In a mixed economy, a combination of these factors can influence overall economic performance and growth potential.
Trade Routes may pass nations, star systems and planets, providing economic benefits through trade agreements, tariffs, and market access, while also influencing geopolitical relationships and strategic alliances. The presence of trade routes can enhance economic growth and development by facilitating the exchange of goods, services, and resources between nations and planets, while also contributing to cultural exchange and diplomatic relations.

Planet Development works as the process of building and improving infrastructure, settlements, and districts on planets, which can contribute to population growth, resource production, and economic development. The development of planets can also provide strategic advantages, such as access to new resources, trade routes, and geopolitical influence. The establishment of colonies on planets can further enhance economic growth and development by providing additional resources, markets, and opportunities for expansion.
Colonization of planets: works as building settlements and districts on planets, which can contribute to population growth, resource production, and economic development. The establishment of colonies can also provide strategic advantages, such as access to new resources, trade routes, and geopolitical influence.

Planet has status, such as attractiveness to migration, climate, amenities, population capacity, and logistics, which can influence population growth, economic development, and private investment. The status of a planet can also impact the success of colonization efforts and the overall development of the planet.

Military works as,
- Spacefleet (Navy to Fleets)
- Aerspace Forces (Air Force to Wings)
- Ground Forces (Army to Divisions)
- Custom branch (e.g. Marines, Special Forces, etc.)

All units consume food and alloys, and require manpower to maintain. Size and customization depends on the player & roleplay decision.
Ships/aircrafts can be refitted and upgraded, while ground forces can be retrained and redeployed. Both can be disbanded to free up resources and manpower, but at the cost of losing the unit and its experience.
Ships/aircrafts can be produced by ---/turn and only deployed after training ---/turn compleition, while ground forces can be deployed after training ---/turn completion. 
Ships/aircrafts have special properties such as speed, range, and combat capabilities, while ground forces have properties such as mobility, firepower, and defensive capabilities.
Ships/aircrafts can be stationed in space or on planets, while ground forces are stationed on planets or stationed aboard ships/aircrafts.
Ground Forces that was picked up by ships/aircrafts can be deployed to planets or other locations, awhile the manpower amount may exceed, the remaining manpower will be left stranded and their fate will be determined by GM decision.

Spacefleet, Aerospace Forces, and Ground Forces units have these properties:
- Name
- Type
- Size
- Veterancy
  - Green 0% 
  - Fresh 5% 
  - Rookies 10%
  - Trained 15%
  - Regulars 30%
  - Battle-Hardened 50%
  - Seasoned 75%
  - Veteran 100%
- Strength (number of ships/aircrafts/soldiers * alloy in unit stockpile / supply sitation (cut off, partial, normal, abundant))
- Maintenance Cost (alloys and food consumed per turn)
- Training Time (turns required to train the unit)

Ships/aircrafts class/types have these properties:
- Speed
- Range
- Combat Capabilities (e.g. attack power, defense power, special abilities, etc.)
Ground forces class/types have these properties:
- Mobility (e.g. movement speed, terrain adaptability, etc.)
- Firepower (e.g. attack power, range, etc.)
- Defensive Capabilities (e.g. defense power, fortification abilities, etc.)

Planets can be sieged by enemy forces, which can impact the population, resources, and economic output of the planet. The outcome of a siege can be influenced by factors such as the strength of the defending forces, the resources available for defense, and the strategic importance of the planet. A successful siege can lead to the capture of the planet and its resources, while a failed siege can result in significant losses for the attacking forces and potential damage to the planet's infrastructure and population.' 

