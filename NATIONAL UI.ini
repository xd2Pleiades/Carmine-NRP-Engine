IF = CAPITALIST, export credits are from trade, while if = PLANNED, export credits are from surplus production sold to other nations.
  Trade = --- cr (--- cr from exports, --- cr from imports) driven by market demand and supply, influenced by economic policies and galactic market conditions.
  Trade_balance = --- cr (--- cr from exports - --- cr from imports), indicating the net effect of trade on the economy, with a positive balance contributing to economic growth and a negative balance indicating a trade deficit.
  Investments = --- cr, representing the total amount of capital invested in various sectors of the economy, which can drive growth and development.
  Subsidies = --- cr, indicating the financial support provided by the government to specific industries or sectors, which can influence production and economic stability.
  Projects = --- cr, representing the total expenditure on economic projects, which can drive innovation and development in various sectors.
  Local_Market_Output = --- cr, indicating the total economic activity generated within the domestic market, influenced by consumer spending, business investments, and government policies.

IF = PLANNED, the economic model is based on central planning, where the government controls production and distribution of goods and services, and trade credits are allocated based on planned economic activities rather than market demand and supply.
  Export_Surplus = --- cr, representing the excess production that is sold to other nations, contributing to the economy through trade credits.
  Domestic_Production = --- cr, indicating the total output of goods and services produced within the nation, which is planned and controlled by the government to meet the needs of the population and support economic growth.
  Efficiency = --- %, representing the effectiveness of resource utilization and production processes in the planned economy, which can impact overall economic performance and growth potential.
    Construction_Efficiency = --- %, indicating the efficiency of construction projects and infrastructure development, which can influence economic growth and development.
    Research_Efficiency = --- %, representing the efficiency of research and development activities, which can drive innovation and economic growth.
    Bureaucracy_Efficiency = --- %, indicating the efficiency of government administration and management, which can impact economic performance and growth potential.
   Distribution = --- cr, indicating the allocation of resources and goods within the economy, which is managed by the government to ensure equitable access and support for various sectors.

IF = MIXED, the economic model combines elements of both capitalist and planned economies, with a balance between market-driven activities and government intervention. Trade credits can come from both market demand and supply as well as planned economic activities, depending on the specific policies and conditions of the economy.
